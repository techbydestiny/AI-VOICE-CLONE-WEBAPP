{% extends 'base.html' %}
{% load static %}

{% block title %}Reset Password - VoiceClone{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full">
        <div class="bg-white rounded-xl shadow-lg p-8">
            <h2 class="text-2xl font-bold text-gray-900 mb-6">Reset Password</h2>
            <p class="text-gray-600 mb-6">Enter your email address and we'll send you a link to reset your password.</p>
            
            <form method="post" class="space-y-6">
                {% csrf_token %}
                
                <div>
                    <label for="email" class="block text-sm font-medium text-gray-700 mb-2">Email Address</label>
                    <input type="email" name="email" id="email" required
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                           placeholder="your@email.com">
                </div>
                
                <div>
                    <button type="submit" class="w-full gradient-bg text-white py-3 px-4 rounded-lg font-medium hover:opacity-90 transition">
                        Send Reset Link
                    </button>
                </div>
            </form>
            
            <div class="mt-6 text-center">
                <a href="{% url 'accounts:login' %}" class="text-sm text-blue-600 hover:text-blue-500">
                    Back to Login
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
